name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      archive_name: ${{ steps.meta.outputs.archive_name }}
      archive_sha256: ${{ steps.meta.outputs.archive_sha256 }}
      has_tap_token: ${{ steps.tap-token.outputs.has_tap_token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release version
        id: meta
        run: |
          bump_patch() {
            local major minor patch
            IFS=. read -r major minor patch <<<"$1"
            [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]] || {
              echo "VERSION must be MAJOR.MINOR.PATCH" >&2
              exit 1
            }
            printf '%s.%s.%s\n' "$major" "$minor" "$((patch + 1))"
          }

          version="$(cat VERSION)"
          while git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; do
            version="$(bump_patch "$version")"
          done

          if [[ "$(cat VERSION)" != "$version" ]]; then
            printf '%s\n' "$version" > VERSION
          fi

          tools/sync-version.sh

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- VERSION packaging/arch/PKGBUILD packaging/fedora/restart-to-macos.spec; then
            git add VERSION packaging/arch/PKGBUILD packaging/fedora/restart-to-macos.spec
            git commit -m "chore: prepare release v${version}"
            git push origin HEAD:main
          fi

          tag="v${version}"
          release_sha="$(git rev-parse HEAD)"
          archive_name="restart-to-macos-${version}.tar.gz"
          git archive --format=tar.gz --prefix="restart-to-macos-${version}/" "$release_sha" > "$archive_name"
          archive_sha256="$(sha256sum "$archive_name" | awk '{print $1}')"
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "release_sha=$release_sha"
            echo "archive_name=$archive_name"
            echo "archive_sha256=$archive_sha256"
          } >>"$GITHUB_OUTPUT"
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: ${{ steps.meta.outputs.archive_name }}
      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.release_sha }}"
          git push origin "${{ steps.meta.outputs.tag }}"
      - name: Check tap token
        id: tap-token
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [[ -n "$TAP_GITHUB_TOKEN" ]]; then
            echo "has_tap_token=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_tap_token=false" >>"$GITHUB_OUTPUT"
          fi

  build-arch:
    runs-on: ubuntu-latest
    needs: prepare
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
      - uses: actions/download-artifact@v4
        with:
          name: source-archive
          path: source-archive
      - name: Install build tools
        run: pacman -Sy --noconfirm git sed grep fakeroot
      - name: Build Arch package
        run: |
          mkdir -p out pkg
          cp packaging/arch/PKGBUILD pkg/PKGBUILD
          sed -i "s|^pkgver=.*|pkgver=${{ needs.prepare.outputs.version }}|" pkg/PKGBUILD
          sed -i "s|^source=.*|source=('${{ needs.prepare.outputs.archive_name }}')|" pkg/PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${{ needs.prepare.outputs.archive_sha256 }}')|" pkg/PKGBUILD
          mv "source-archive/${{ needs.prepare.outputs.archive_name }}" pkg/
          useradd -m builder >/dev/null 2>&1 || true
          chown -R builder:builder pkg out
          su builder -c "cd pkg && makepkg --nodeps --force --cleanbuild"
          cp pkg/*.pkg.tar.* out/restart-to-macos.pkg.tar.zst
      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: out/restart-to-macos.pkg.tar.zst

  build-fedora:
    runs-on: ubuntu-latest
    needs: prepare
    container: fedora:41
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
      - uses: actions/download-artifact@v4
        with:
          name: source-archive
          path: source-archive
      - name: Install build tools
        run: dnf install -y rpm-build tar gzip findutils
      - name: Build RPM
        run: |
          topdir="$(mktemp -d)"
          tmppath="$topdir/tmp"
          mkdir -p "$topdir"/{BUILD,BUILDROOT,RPMS,SRPMS,SOURCES,SPECS} "$tmppath"
          mv "source-archive/${{ needs.prepare.outputs.archive_name }}" "$topdir/SOURCES/"
          cp packaging/fedora/restart-to-macos.spec "$topdir/SPECS/"
          sed -i "s/^Version:[[:space:]]*.*/Version:        ${{ needs.prepare.outputs.version }}/" "$topdir/SPECS/restart-to-macos.spec"
          rpmbuild -ba \
            --define "_topdir $topdir" \
            --define "_sourcedir $topdir/SOURCES" \
            --define "_tmppath $tmppath" \
            "$topdir/SPECS/restart-to-macos.spec"
          mkdir -p out
          cp "$topdir"/RPMS/noarch/*.rpm out/restart-to-macos.noarch.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: fedora-package
          path: out/restart-to-macos.noarch.rpm

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-arch
      - build-fedora
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
      - uses: actions/download-artifact@v4
        with:
          name: source-archive
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: arch-package
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: fedora-package
          path: release-assets
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat >release-notes.txt <<'EOF'
          Assets:

          - source tarball
          - Arch package
          - Fedora RPM
          EOF
          gh release create "${{ needs.prepare.outputs.tag }}" \
            "release-assets/${{ needs.prepare.outputs.archive_name }}" \
            release-assets/restart-to-macos.pkg.tar.zst \
            release-assets/restart-to-macos.noarch.rpm \
            --title "restart-to-macos ${{ needs.prepare.outputs.tag }}" \
            --notes-file release-notes.txt

  update-arch-checksum:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Update PKGBUILD checksum
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          sed -i "s|^sha256sums=.*|sha256sums=('${{ needs.prepare.outputs.archive_sha256 }}')|" packaging/arch/PKGBUILD
      - name: Commit checksum update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet -- packaging/arch/PKGBUILD && exit 0
          git add packaging/arch/PKGBUILD
          git commit -m "chore: update arch checksum for ${{ needs.prepare.outputs.tag }}"
          git push origin HEAD:main

  update-homebrew-tap:
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.outputs.has_tap_token == 'true' }}
    needs:
      - prepare
      - publish-release
    env:
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
      - name: Check out tap repo
        uses: actions/checkout@v4
        with:
          repository: jtbrough/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap
      - name: Render formula
        run: |
          mkdir -p homebrew-tap/Formula
          packaging/brew/build.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ needs.prepare.outputs.archive_sha256 }}" \
            > homebrew-tap/Formula/restart-to-macos.rb
      - name: Commit and push tap update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/restart-to-macos.rb
          if git diff --cached --quiet -- Formula/restart-to-macos.rb; then
            git commit --allow-empty -m "chore: sync restart-to-macos release ${{ needs.prepare.outputs.version }}"
          else
            git commit -m "feat: update restart-to-macos to ${{ needs.prepare.outputs.version }}"
          fi
          git push origin HEAD
